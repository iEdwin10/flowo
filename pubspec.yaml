name: flowo
description: Flowo – Budget & épargne app with premium animations and haptics.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  uuid: ^4.3.3
  intl: ^0.19.0
  haptic_feedback: ^0.5.1+1
  audioplayers: ^6.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/animations/
    - assets/images/
